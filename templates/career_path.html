<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Roadmap</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static',filename='navbar-footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static',filename='career_path.css') }}">
</head>
<body class="roadmap-body">
    {% include 'partials/navbar.html' %}

    <a href="{{ url_for('result') }}" class="back-arrow" title="Back to Result Page">
     ← 
    </a>

    <main class="roadmap-shell">
        <h2 id="title" class="roadmap-title">Career Roadmap</h2>

        <div class="history" id="historyBox"></div>

        <div class="progress">
            <p>Progress: <span id="percent">0%</span></p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="timeline" id="timeline"></div>

        <div class="extra-section">
            <div class="box">
                <h3>🧠 Skills Required</h3>
                <div class="items" id="skills"></div>
            </div>

            <div class="box">
                <h3>💼 Projects to Build</h3>
                <div class="items" id="projects"></div>
            </div>

            <div class="box">
                <h3>📚 Learning Resources</h3>
                <div class="items" id="resources"></div>
            </div>
        </div>
    </main>

    <script>
        const urlCareer = new URLSearchParams(window.location.search).get("career") || "";
        const selectedCareer = {{ selected_career|default('', true)|tojson }};
        const userId = localStorage.getItem("userId");
        const history = JSON.parse(localStorage.getItem(`history_${userId}`)) || [];
        const activeCareerKey = userId ? `activeCareer_${userId}` : "activeCareer";
        const careers = [...new Set(history.map(h => h.career).filter(Boolean))];
        const preferredCareer = urlCareer || selectedCareer;
        if (preferredCareer && !careers.includes(preferredCareer)) {
            careers.push(preferredCareer);
        }
        let currentCareer = preferredCareer || localStorage.getItem(activeCareerKey) || (history.length ? history[history.length - 1].career : "");
        const historyBox = document.getElementById("historyBox");

        if (careers.length === 0) {
            historyBox.innerHTML = "<p>No career history found. Complete a quiz first.</p>";
        }

        careers.forEach(careerName => {
            const button = document.createElement("button");
            button.type = "button";
            button.textContent = careerName;
            button.addEventListener("click", () => loadCareer(careerName));
            historyBox.appendChild(button);
        });

        function loadCareer(career) {
            currentCareer = career;
            localStorage.setItem(activeCareerKey, career);
            const nextUrl = `${window.location.pathname}?career=${encodeURIComponent(career)}`;
            window.history.replaceState({}, "", nextUrl);
            document.getElementById("title").innerText = career + " Roadmap";

            const progressKey = `progress_${career}_${userId}`;
            let progressData = JSON.parse(localStorage.getItem(progressKey)) || [];

            fetch(`/get-path/${encodeURIComponent(career)}`)
                .then(res => res.json())
                .then(data => {
                    const steps = data.steps || [];
                    const skills = data.skills || [];
                    const projects = data.projects || [];
                    const resources = data.resources || [];

                    const timeline = document.getElementById("timeline");
                    timeline.innerHTML = "";
                    
                    if (!steps.length && !skills.length && !projects.length && !resources.length) {
                        timeline.innerHTML = `
                            <div class="step-box left">
                                <div class="content">
                                    No learning path is available for ${career} yet.
                                </div>
                            </div>
                        `;
                    }

                    steps.forEach((step, i) => {
                        const checked = progressData.includes(i) ? "checked" : "";

                        timeline.innerHTML += `
                            <div class="step-box ${i % 2 === 0 ? 'left' : 'right'}">
                                <div class="content">
                                    <label>
                                        <input type="checkbox" ${checked} onchange="updateProgress(${i})">
                                        <b>Step ${i + 1}:</b> ${step}
                                    </label>
                                </div>
                            </div>
                        `;
                    });

                    const skillsBox = document.getElementById("skills");
                    skillsBox.innerHTML = "";
                    skills.forEach(s => {
                        skillsBox.innerHTML += `<span>${s}</span>`;
                    });

                    const projectsBox = document.getElementById("projects");
                    projectsBox.innerHTML = "";
                    projects.forEach(p => {
                        projectsBox.innerHTML += `<span>${p}</span>`;
                    });

                    const resourcesBox = document.getElementById("resources");
                    resourcesBox.innerHTML = "";
                    resources.forEach(r => {
                        resourcesBox.innerHTML += `
                            <a href="${r.link}" target="_blank" class="resource-card">
                                🔗 ${r.name}
                            </a>
                        `;
                    });

                    updateProgressUI(steps.length, progressData);
                });
        }

        function updateProgress(index) {
            const progressKey = `progress_${currentCareer}_${userId}`;
            let progressData = JSON.parse(localStorage.getItem(progressKey)) || [];

            if (progressData.includes(index)) {
                progressData = progressData.filter(i => i !== index);
            } else {
                progressData.push(index);
            }

            localStorage.setItem(progressKey, JSON.stringify(progressData));

            fetch(`/get-path/${encodeURIComponent(currentCareer)}`)
                .then(res => res.json())
                .then(data => {
                    updateProgressUI((data.steps || []).length, progressData);
                });
        }

        function updateProgressUI(total, progressData) {
            const percent = total === 0 ? 0 : Math.round((progressData.length / total) * 100);
            document.getElementById("percent").innerText = percent + "%";
            document.getElementById("progressFill").style.width = percent + "%";
        }

        if (currentCareer) {
            loadCareer(currentCareer);
        }
    </script>

{% include 'partials/footer.html' %}

</body>
</html>
</html>
