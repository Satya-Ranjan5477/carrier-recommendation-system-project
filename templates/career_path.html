<!DOCTYPE html>
<html>
<head>
<title>Career Roadmap</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    padding: 20px;
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #4f46e5;
}

/* HISTORY BUTTONS */
.history {
    max-width: 900px;
    margin: auto;
    text-align: center;
    margin-bottom: 20px;
}

.history button {
    margin: 5px;
    padding: 8px 14px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* PROGRESS */
.progress {
    max-width: 800px;
    margin: 20px auto;
}

.progress-bar {
    height: 10px;
    background: #ddd;
    border-radius: 10px;
}

.progress-fill {
    height: 10px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    width: 0%;
    border-radius: 10px;
}

/* ================= ZIG-ZAG ROADMAP ================= */

.timeline {
    position: relative;
    max-width: 900px;
    margin: auto;
}

/* CENTER LINE */
.timeline::after {
    content: '';
    position: absolute;
    width: 4px;
    background: #6366f1;
    top: 0;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
}

/* STEP BOX */
.step-box {
    position: relative;
    width: 50%;
    padding: 20px 40px;
    box-sizing: border-box;
}

/* LEFT SIDE */
.left {
    left: 0;
}

/* RIGHT SIDE */
.right {
    left: 50%;
}

/* CONTENT CARD */
.content {
    background: #ffffff;
    padding: 15px 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* DOT COMMON */
.step-box::before {
    content: '';
    position: absolute;
    top: 50%;
    width: 18px;
    height: 18px;
    background: #6366f1;
    border-radius: 50%;
    transform: translateY(-50%);
    z-index: 2;
}

/* LEFT DOT */
.left::before {
    right: -9px;
}

/* RIGHT DOT */
.right::before {
    left: -9px;
}

.resource-card {
    display: inline-block;
    background: white;
    padding: 10px 15px;
    border-radius: 10px;
    text-decoration: none;
    color: #4f46e5;
    font-weight: 500;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.resource-card:hover {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input[type="checkbox"] {
    margin-right: 10px;
    transform: scale(1.2);
}

/* ================= EXTRA SECTIONS ================= */

.extra-section {
    max-width: 900px;
    margin: 40px auto;
    display: grid;
    gap: 20px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.box h3 {
    margin-bottom: 10px;
    color: #4f46e5;
}

.items {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.items span {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
}

/* MOBILE */
@media (max-width: 768px) {
    .step-box {
        width: 100%;
        left: 0 !important;
        text-align: left;
    }

    .timeline::before {
        left: 20px;
    }

    .step-box::after {
        left: 10px;
    }
}
</style>
</head>

<body>

<h2 id="title">Career Roadmap</h2>

<!-- HISTORY -->
<div class="history" id="historyBox"></div>

<!-- PROGRESS -->
<div class="progress">
    <p>Progress: <span id="percent">0%</span></p>
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</div>

<!-- ROADMAP -->
<div class="timeline" id="timeline"></div>

<!-- EXTRA -->
<div class="extra-section">

    <div class="box">
        <h3>🧠 Skills Required</h3>
        <div class="items" id="skills"></div>
    </div>

    <div class="box">
        <h3>💼 Projects to Build</h3>
        <div class="items" id="projects"></div>
    </div>

    <div class="box">
        <h3>📚 Learning Resources</h3>
        <div class="items" id="resources"></div>
    </div>

</div>

<script>

// USER
const userId = localStorage.getItem("userId");

// HISTORY
const history = JSON.parse(localStorage.getItem(`history_${userId}`)) || [];

// UNIQUE CAREERS
const careers = [...new Set(history.map(h => h.career))];

// DEFAULT CAREER
let currentCareer = history.length ? history[history.length - 1].career : "";

// BUTTONS
const historyBox = document.getElementById("historyBox");

if (careers.length === 0) {
    historyBox.innerHTML = "<p>No career history found</p>";
}

careers.forEach(c => {
    historyBox.innerHTML += `<button onclick="loadCareer('${c}')">${c}</button>`;
});

// LOAD CAREER
function loadCareer(career) {

    currentCareer = career;

    document.getElementById("title").innerText = career + " Roadmap";

    const progressKey = `progress_${career}_${userId}`;
    let progressData = JSON.parse(localStorage.getItem(progressKey)) || [];

    fetch(`/get-path/${career}`)
    .then(res => res.json())
    .then(data => {

        const steps = data.steps || [];
        const skills = data.skills || [];
        const projects = data.projects || [];
        const resources = data.resources || [];

        const timeline = document.getElementById("timeline");
        timeline.innerHTML = "";

        // ROADMAP
        steps.forEach((step, i) => {
            const checked = progressData.includes(i) ? "checked" : "";

            timeline.innerHTML += `
                <div class="step-box ${i % 2 === 0 ? 'left' : 'right'}">
                    <div class="content">
                        <label>
                            <input type="checkbox" ${checked}
                            onchange="updateProgress(${i})">
                            <b>Step ${i + 1}:</b> ${step}
                        </label>
                    </div>
                </div>
            `;
        });

        // SKILLS
        const skillsBox = document.getElementById("skills");
        skillsBox.innerHTML = "";
        skills.forEach(s => {
            skillsBox.innerHTML += `<span>${s}</span>`;
        });

        // PROJECTS
        const projectsBox = document.getElementById("projects");
        projectsBox.innerHTML = "";
        projects.forEach(p => {
            projectsBox.innerHTML += `<span>${p}</span>`;
        });

        // RESOURCES
        const resourcesBox = document.getElementById("resources");
           resourcesBox.innerHTML = "";

           resources.forEach(r => {
           resourcesBox.innerHTML += `
          <a href="${r.link}" target="_blank" class="resource-card">
            🔗 ${r.name}
          </a>
        `;
});

        updateProgressUI(steps.length, progressData);
    });
}

// UPDATE PROGRESS
function updateProgress(index) {

    const progressKey = `progress_${currentCareer}_${userId}`;
    let progressData = JSON.parse(localStorage.getItem(progressKey)) || [];

    if (progressData.includes(index)) {
        progressData = progressData.filter(i => i !== index);
    } else {
        progressData.push(index);
    }

    localStorage.setItem(progressKey, JSON.stringify(progressData));

    fetch(`/get-path/${currentCareer}`)
    .then(res => res.json())
    .then(data => {
        updateProgressUI(data.steps.length, progressData);
    });
}

// UPDATE UI
function updateProgressUI(total, progressData) {
    const percent = total === 0 ? 0 : Math.round((progressData.length / total) * 100);

    document.getElementById("percent").innerText = percent + "%";
    document.getElementById("progressFill").style.width = percent + "%";
}

// INITIAL LOAD
if (currentCareer) {
    loadCareer(currentCareer);
}

</script>

</body>
</html>
