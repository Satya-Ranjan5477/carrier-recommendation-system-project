<!DOCTYPE html>
<html>
<head>
    <title>Login - Career Mitra</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>
<body class="form-body">

<div class="form-container">
    <h2>Login</h2>

    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p><a href="#" id="forgotPassword">Forgot Password?</a></p>

    <p>New user? <a href="{{ url_for('register') }}">Register here</a></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBJH6QrR5sEHRzdTeCV-N3dl99rDs_1xzk",
    authDomain: "career-mitracom.firebaseapp.com",
    projectId: "career-mitracom",
    storageBucket: "career-mitracom.firebasestorage.app",
    messagingSenderId: "298890333500",
    appId: "1:298890333500:web:f8acde75ceb927d7246239"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


// LOGIN
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {
        window.location.href = "/dashboard";
    })
    .catch(() => {
        alert("Wrong Email or Password ❌");
    });
});


// FORGOT PASSWORD
document.getElementById("forgotPassword").addEventListener("click", function() {

    const email = document.getElementById("loginEmail").value;

    if (!email) {
        alert("Please enter your email first 📧");
        return;
    }

    sendPasswordResetEmail(auth, email)
    .then(() => {
        alert("Password reset link sent to your email ✅");
    })
    .catch((error) => {
        alert(error.message);
    });

});
</script>

</body>
</html>
