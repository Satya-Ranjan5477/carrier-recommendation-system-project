<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - Career Mitra</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static',filename='navbar-footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static',filename='result.css') }}">
</head>
<body class="result-body">
    {% include 'partials/navbar.html' %}

    <main class="result-page">
        <section class="result-shell">
            <h2 class="result-label">Recommended Career</h2>
            <h1 class="career-title">{{ career or 'Career not found' }}</h1>
            <p class="result-description">Based on your skills, this path offers the best growth and fulfillment.</p>

            <h3 id="scoreDisplay" class="result-meta">Take the quiz to see your latest score.</h3>

            <div class="result-actions">
                <button type="button" class="primary-action" onclick="startQuiz()">Start Career Quiz</button>
                <button type="button" id="analysisBtn" class="secondary-action" onclick="showAnalysis()" style="display:none;">Result Analysis</button>
                <a href="{{ url_for('form') }}" class="secondary-action">Try another path</a>
                <a href="{{ url_for('dashboard') }}" class="secondary-action">Go to Dashboard</a>
            </div>

            <div id="analysisBox" class="analysis-box" style="display:none;"></div>
        </section>
    </main>

    <script>
        const career = {{ career|tojson }};
        const userId = localStorage.getItem("userId");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const analysisBtn = document.getElementById("analysisBtn");
        const analysisBox = document.getElementById("analysisBox");
        const score = userId ? localStorage.getItem(`quizScore_${userId}`) : null;
        const total = userId ? localStorage.getItem(`totalQuestions_${userId}`) : null;
        const analysis = userId ? (JSON.parse(localStorage.getItem(`quizAnalysis_${userId}`) || "[]")) : [];

        if (score && total) {
            scoreDisplay.innerText = `Latest quiz score: ${score}/${total}`;
            analysisBtn.style.display = "inline-flex";
        }

        function startQuiz() {
            if (!career) {
                window.location.href = "{{ url_for('form') }}";
                return;
            }

            window.location.href = `/quiz?career=${encodeURIComponent(career)}`;
        }

        function showAnalysis() {
            if (!analysis.length) {
                analysisBox.style.display = "block";
                analysisBox.innerHTML = "<p>No quiz analysis available yet.</p>";
                return;
            }

            let html = "";

            analysis.forEach((item, index) => {
                const isCorrect = item.user === item.correct;
                html += `
                    <div class="analysis-item">
                        <p><strong>Q${index + 1}:</strong> ${item.question}</p>
                        <p>Your Answer: ${item.user || 'Not answered'} ${isCorrect ? '✅' : '❌'}</p>
                        ${isCorrect ? '' : `<p>Correct Answer: ${item.correct}</p>`}
                    </div>
                `;
            });

            analysisBox.innerHTML = html;
            analysisBox.style.display = "block";
            analysisBtn.style.display = "none";
        }
    </script>

{% include 'partials/footer.html' %}

</body>
</html>
